services:
  webhook-catcher:
    build: .
    image: webhook-catcher
    ports:
      - "8090:8090"
    environment:
      # Dashboard/admin password. If unset, one is generated on first start
      # and printed in the container logs.
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
    volumes:
      - webhook-data:/data
    restart: unless-stopped

volumes:
  webhook-data:
