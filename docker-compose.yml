services:
  webhook-catcher:
    build: .
    image: webhook-catcher
    ports:
      - "8090:8090"
    environment:
      # Password for the admin user. Defaults to Youdo365! — override by
      # setting ADMIN_PASSWORD in the shell or an .env file next to this file.
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-Youdo365!}
    volumes:
      - webhook-data:/data
    restart: unless-stopped

volumes:
  webhook-data:
