services:
  webhook-catcher:
    build: .
    image: webhook-catcher
    ports:
      - "8090:8090"
    environment:
      # Password for the admin user — set directly here.
      - ADMIN_PASSWORD=Youdo365!
      # Optional: paste your Uptime Kuma push-monitor URL here (from the Push
      # monitor you create in Kuma) — the app pings it every minute.
      # Example: - UPTIME_KUMA_PUSH_URL=https://kuma.example.com/api/push/AbC123xyz
      - UPTIME_KUMA_PUSH_URL=
    volumes:
      - webhook-data:/data
    restart: unless-stopped

volumes:
  webhook-data:
